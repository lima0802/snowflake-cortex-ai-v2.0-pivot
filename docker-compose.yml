# DIA v2 - Docker Compose
# Run: docker-compose up --build
# Access: Streamlit at http://localhost:8501, API at http://localhost:8000

version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: streamlit run ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DIA_API_URL=http://api:8000
    depends_on:
      - api
