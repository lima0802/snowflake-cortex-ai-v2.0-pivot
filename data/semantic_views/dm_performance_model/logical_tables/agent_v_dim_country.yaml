---
# =============================================================================
# MODULE: logical_tables — EMAIL_PERFORMANCE (primary fact table)
# Purpose: Define the dimensions exposed from the SFMC performance fact table.
# Owned by: Data Engineering
#
# Structure follows the Snowflake Semantic View YAML spec:
#   https://docs.snowflake.com/en/user-guide/views-semantic/semantic-view-yaml-spec
#
# Each entry in 'tables' corresponds to one logical table (= one base_table).
# The 'name' must match the alias defined in view_metadata.yaml.
# The 'base_table' fully qualifies the physical table using the same
# {{DATABASE}} / {{SCHEMA}} placeholders resolved at deploy time.
# =============================================================================

tables:
  - name: AGENT_V_DIM_COUNTRY
    description: >
      Dim table contains records of countries with their associated geographic and business classifications. Each record represents a single country and includes regional groupings, sales territories, and market designations used for organizational reporting and analysis.
    base_table:
      database: "{{DATABASE}}"
      schema: "{{SCHEMA}}"
      table: AGENT_V_DIM_COUNTRY

    dimensions:
      - name: COUNTRY_CODE
        synonyms:
          - COUNTRY_ABBREVIATION
          - COUNTRY_ISO
          - ISO_CODE
          - ISO_COUNTRY_CODE
          - TWO_LETTER_CODE
        description: >
          The standardized country code (ISO format).
        expr: COUNTRY_CODE
        data_type: VARCHAR(200)
        sample_values:
          - "UK"
          - "DE"
          - "FR"

      - name: COUNTRY_NAME
        synonyms:
          - COUNTRY
          - COUNTRY_LABEL
          - COUNTRY_TITLE
          - GEOGRAPHIC_NAME
          - LOCATION_NAME
          - NATION
          - NATION_NAME
          - STATE_NAME
          - TERRITORY_NAME
        description: >
          The full name of the country.
        expr: COUNTRY_NAME
        data_type: VARCHAR(200)
        sample_values:
          - "Belgium"
          - "Albania"
          - "North Macedonia"

      - name: MARKET_CD
        synonyms:
          - COMMERCIAL_MARKET_ID
          - MARKET_CODE
          - MARKET_DESIGNATION
          - MARKET_ID
          - MARKET_IDENTIFIER
          - MARKET_SEGMENT_CODE
          - MKT_CD
          - MKT_CODE
          - TRADING_MARKET_CODE
        description: >
          The market code identifier (numeric).
        expr: MARKET_CD
        data_type: NUMBER(38,0)
        sample_values:
          - "441"
          - "434"
          - "481"

      - name: REGION_NAME_GROUP
        synonyms:
          - AREA
          - CONTINENT
          - GEOGRAPHIC_REGION
          - HIGH_LEVEL_REGION
          - REGION
          - REGION_GROUP
          - REGION_NAME
          - REGIONAL_GROUPING
        description: >
          The primary regional grouping field for global aggregation and reporting.
        expr: REGION_NAME_GROUP
        data_type: VARCHAR(100)
        sample_values:
          - "APEC"
          - "EMEA"
          - "US/CAN"
          - "LATAM"
          - "Other"

      - name: SALES_AREA
        synonyms:
          - BUSINESS_AREA
          - COMMERCIAL_AREA
          - DETAILED_REGION
          - DISTRIBUTION_AREA
          - MARKET_AREA
          - MARKET_SEGMENT
          - MARKET_TERRITORY
          - SALES_DISTRICT
          - SALES_REGION
          - SALES_TERRITORY
          - SALES_ZONE
        description: >
          The sales area designation for the country.
        expr: SALES_AREA
        data_type: VARCHAR(100)
        sample_values:
          - "Nordics"
          - "Central Europe"
          - "Western Europe"
          - "UK & Ireland"
          - "Eastern Europe"
          - "EMEA Importers"
          - "APEC NSC"
          - "APEC Importers"
          - "USA and Canada"
          - "LATAM NSC"
          - "LATAM Importers"
          - "Greater China"
          - "Global App"
          - "Multi-market app"
          - "Global Major Accounts"

      - name: SUB_REGION
        synonyms:
          - REGIONAL_SEGMENT
          - SUB_REGION_NAME
          - SUBREGION
        description: >
          Sub-regional grouping for more granular geographic analysis.
        expr: SUB_REGION
        data_type: VARCHAR(100)
        sample_values:
          - "APEC"
          - "EMEA"
          - "Greater China"
          - "LATAM"
          - "Other"
          - "USA and Canada"

      - name: VC_COUNTRY_CODE
        synonyms:
          - BU_CODE
          - BUSINESS_UNIT
          - INTERNAL_COUNTRY_CODE
          - VC_CODE
          - VC_COUNTRY_ID
          - VC_COUNTRY_IDENTIFIER
          - VC_COUNTRY_REF
          - VOLVO_CARS_COUNTRY_CODE
          - VOLVO_COUNTRY_CODE
          - VOLVO_COUNTRY_ID
        description: >
          Volvo Cars specific country code identifier.
          Primary key for joining to fact table via BUSINESSUNIT.
          Examples: VCUK, VCDE, VCFR, VCES, VCIT, VCNL, VCBE, VCJP, VCKR.
        expr: VC_COUNTRY_CODE
        data_type: VARCHAR(202)
        sample_values:
          - "VCMK"
          - "VCAL"
          - "VCFR"
    
    # ── Filters ────────────────────────────────────────────────────────────────
    filters:
      - name: D2C_market
        description: >
          markets that sell direct to consumers (currently only UK)
        expr: vc_country_code = 'VCUK'

      - name: apac_region
        description: >
          Filters for Asia Pacific (APEC) region markets. Use when questions ask about 'Asia', 'Asia Pacific', 'APAC', 'Asian markets', 'Pacific region', or mention specific APAC countries like Japan, Korea, Australia, China. Helps analyze performance across the Asia Pacific regional grouping for geographic comparisons and regional strategy assessment.
        expr: region_name_group = 'APEC'

      - name: emea_region
        description: >
          Filters for Europe, Middle East, and Africa (EMEA) region markets at the highest level. Use when questions ask about 'Europe', 'European markets', 'EMEA', 'EU performance', 'European region', 'Middle East', 'Africa' as a whole region. For specific sub-regions like Nordics, Central Europe, or Western Europe, use the corresponding sub-region filters instead. Helps analyze performance across the entire EMEA regional grouping.
        expr: region_name_group = 'EMEA'

      - name: latam_region
        description: >
          Filters for Latin America (LATAM) region markets. Use when questions ask about 'Latin America', 'LATAM', 'South America', 'Central America', 'LatAm', or mention specific Latin American countries like Mexico, Brazil, Argentina. Helps analyze performance across the Latin American regional grouping for geographic comparisons and regional strategy assessment.
        expr: region_name_group = 'LATAM'

      - name: other_region
        description: >
          Filters for markets classified as 'Other' region. Use only when user explicitly mentions 'Other' region or asks about markets not belonging to EMEA, APEC, US/CAN, or LATAM regional groupings. Do not apply this filter for general or global queries. Helps isolate performance for markets outside the main regional classifications.
        expr: region_name_group = 'Other'

      - name: us_can_region
        description: >
          Filters for North America (US/CAN) region markets. Use when questions ask about 'USA', 'US', 'United States', 'America', 'American markets', 'Canada', 'Canadian', 'North America', 'NA', or mention specific North American markets. Helps analyze performance across the United States and Canada regional grouping for geographic comparisons and regional strategy assessment.
        expr: region_name_group = 'US/CAN'

    # ── Primary_key ────────────────────────────────────────────────────────────────
    primary_key:
      columns:
        - VC_COUNTRY_CODE