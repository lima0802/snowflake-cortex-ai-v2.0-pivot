        WHERE
          (
            m.email_name NOT ILIKE '%sparkpost%'
            OR m.email_name IS NULL
          )
          AND f.business_unit = 'VCES'
          AND f.send_date >= '2025-07-01'
          AND f.send_date < '2025-10-01'
        GROUP BY
          c.country_name
      ),
      eu_stats AS (
        SELECT
          'EU Average' AS market_name,
          ROUND(
            SUM(f.unsubscribes) * 100.0 / NULLIF(SUM(f.sends), 0),
            2
          ) AS unsubscribe_rate_pct,
          SUM(f.sends) AS total_sends
        FROM AGENT_V_FACT_SFMC_PERFORMANCE_TRACKING f
        LEFT JOIN AGENT_V_DIM_SFMC_METADATA_JOB m ON f.comp_key = m.comp_key
        INNER JOIN AGENT_V_DIM_COUNTRY c ON f.business_unit = c.vc_country_code
        WHERE
          (
            m.email_name NOT ILIKE '%sparkpost%'
            OR m.email_name IS NULL
          )
          AND c.region_name_group = 'EMEA'
          AND f.send_date >= '2025-07-01'
          AND f.send_date < '2025-10-01'
      )
      SELECT * FROM spain_stats
      UNION ALL
