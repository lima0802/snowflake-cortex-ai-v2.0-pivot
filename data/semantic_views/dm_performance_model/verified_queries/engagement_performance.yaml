  - name: BLOCK_CLICKS_PCT_BY_LTA
    question: "Compare unique block clicks percentage across different Link Tracking Aliases"
    verified_by: "Analytics Team"
    verified_at: "2026-03-13"
    use_as_onboarding_question: true
    sql: |-
      SELECT
        a.linktrackingalias AS link_tracking_alias,
        SUM(b.unique_block_clicks) AS total_unique_block_clicks,
        ROUND(
          SUM(b.unique_block_clicks) * 100.0 / NULLIF(
            SUM(SUM(b.unique_block_clicks)) OVER (),
            0
          ),
          1
        ) AS percentage
      FROM AGENT_V_FACT_SFMC_PERFORMANCE_BLOCK b
      LEFT JOIN AGENT_V_DIM_SFMC_ALIAS a ON b.alias = a.alias
      LEFT JOIN AGENT_V_DIM_SFMC_METADATA_JOB m ON b.comp_key = m.comp_key
      WHERE
        (
          m.email_name NOT ILIKE '%sparkpost%'
          OR m.email_name IS NULL
        )
        AND a.linktrackingalias IS NOT NULL
      GROUP BY
        a.linktrackingalias
      ORDER BY
        total_unique_block_clicks DESC

